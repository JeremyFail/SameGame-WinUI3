# Help
help.title=Help
help.close=Close
help.page.howToPlay.title=How to Play
help.page.howToPlay.body=SameGame is played on a grid of colored blocks.\n\n\u2022 Click a group of two or more adjoining blocks of the same color to highlight them.\n\u2022 Click the highlighted group again to remove it and score points.\n\u2022 Click elsewhere to clear the highlight without removing blocks.\n\u2022 After removal, blocks fall down and empty columns slide left.\n\u2022 The game ends when no more groups of two or more can be removed.\n\u2022 Your goal is to remove as many blocks as possible - ideally all of them!\n\nScoring: Points for removing n blocks = n\u00b2 \u2212 3n + 4\nExamples: 2 blocks = 2 pts, 3 = 4 pts, 4 = 8 pts, 5 = 14 pts
help.page.tips.title=Tips & Strategy
help.page.tips.body=\u2022 Look for large groups - bigger removals score much more points.\n\u2022 Try to leave yourself options: removing a group can change which groups form.\n\u2022 Work from the bottom when possible so falling blocks create new opportunities.\n\u2022 Sometimes clearing a small group opens up a much larger one.\n\u2022 Use Undo (File menu) to experiment with different moves.\n\u2022 Easy boards cluster similar colors; Hard spreads them apart. Neither is guaranteed fully solvable.
help.page.options.title=Options
help.page.options.body=File Menu\n\u2022 New Game (F2) - start a fresh random board\n\u2022 Restart - replay the current board (same seed)\n\u2022 Undo (Ctrl+Z) - reverse your last move\n\u2022 Redo (Ctrl+Y) - replay an undone move\n\nOptions Menu\n\u2022 Language - choose the display language\n\u2022 Difficulty - board generation difficulty (see below)\n\u2022 Size - Small (10\u00d710), Normal (20\u00d710), Large (20\u00d720), or Custom via Advanced Options\n\u2022 Sound - enable/disable sound effects\n\u2022 Music - enable/disable background music (when available)\n\u2022 Animations - enable/disable move animations (click the board to skip)\n\u2022 Advanced - full customization dialog\n\nView Menu\n\u2022 Skin - tile appearance (Modern, Classic, Marbles, and more)\n\u2022 Objectives - shows remaining count per color\n\u2022 High Scores - top 10 scores\n\nHelp Menu\n\u2022 Help (F1) - open this help window\n\nDifficulty\n\u2022 Easy - tiles tend to match their neighbors (soft clusters)\n\u2022 Medium - unbiased random colors\n\u2022 Hard - tiles tend to differ from neighbors (more scattered)\n\nAdvanced Options\n\u2022 Customize board size, number of colors (3\u20136), timer, theme, colors, background, animations, language, sound, music, and randomness (shuffle intensity within the chosen difficulty)

