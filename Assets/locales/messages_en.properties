# Help
help.title=Help
help.close=Close
help.page.howToPlay.title=How to Play
help.page.howToPlay.body=## Welcome to SameGame\nClear the board by removing groups of matching colored blocks. Every click reshapes the puzzle beneath your feet, so think a move or two ahead.\n\n### Making a Move\n\u2022 **Select** - Click any group of two or more adjoining blocks of the same color\n\u2022 **Remove** - Click the highlighted group again to clear it and score points\n\u2022 **Cancel** - Click elsewhere to drop the selection without removing anything\n\n### Gravity Rules\nWhen blocks disappear, everything above **falls down**, and empty columns **slide left**. The board never stands still for long.\n\n### Winning (and Losing)\nThe game ends when no removable groups remain. Your goal is to clear as many blocks as possible - a completely empty board is the ultimate triumph.\n\n## Scoring\nBigger clears mean bigger rewards. Points for removing **n** blocks follow this formula:\n\n**n\u00b2 \u2212 3n + 4**\n\n**Quick examples:** 2 blocks \u2192 2 pts \u00b7 3 \u2192 4 pts \u00b7 4 \u2192 8 pts \u00b7 5 \u2192 14 pts \u00b7 10 \u2192 74 pts
help.page.tips.title=Tips & Strategy
help.page.tips.body=## Think Big\nA group of 10 blocks is worth **74 points** - the same as clearing thirty-seven pairs of two. Patience pays.\n\n### Read the Board\n\u2022 **Look ahead** - Removing one group can create - or destroy - another. A small sacrifice today might unlock a monster combo tomorrow.\n\u2022 **Work from the bottom** - Clearing lower blocks lets gravity work for you, often stitching scattered tiles into fresh groups.\n\u2022 **Keep options open** - Before you click, ask: \u201cWill I trap a color I still need?\u201d\n\n### Small Moves, Big Payoffs\nDo not hesitate to clear a tiny group if it opens a path to something much larger. The best players think in chains, not single clicks.\n\n### Experiment Freely\n**Undo** (Ctrl+Z in the File menu) is your sandbox. Try a move, see what falls, and step back if it does not pan out.\n\n### Know Your Difficulty\n**Easy** boards cluster similar colors into soft patches. **Hard** boards scatter colors apart. Neither difficulty guarantees a fully clearable board - that is part of the challenge.
help.page.options.title=Options
help.page.options.body=## File Menu\n\u2022 **New Game** (F2) - Shuffle up a brand-new random board\n\u2022 **Restart** - Replay the current board from the beginning (same layout)\n\u2022 **Undo** (Ctrl+Z) - Step back one move\n\u2022 **Redo** (Ctrl+Y) - Replay a move you undid\n\n## Options Menu\n\u2022 **Language** - Choose the display language\n\u2022 **Difficulty** - How the board is generated (see below)\n\u2022 **Size** - Small (10\u00d710), Normal (20\u00d710), Large (20\u00d720), or Custom via Advanced Options\n\u2022 **Sound** - Toggle sound effects\n\u2022 **Music** - Toggle background music (when available)\n\u2022 **Animations** - Toggle move animations (click the board to skip)\n\u2022 **Advanced\u2026** - Open the full customization dialog\n\n## View Menu\n\u2022 **Skin** - Change tile appearance (Modern, Classic, Marbles, and more)\n\u2022 **Objectives** - Show how many blocks remain for each color\n\u2022 **High Scores** - Browse the top 10 scores\n\n## Help Menu\n\u2022 **Help** (F1) - Open this window\n\n## Difficulty\n\u2022 **Easy** - Tiles tend to match their neighbors, forming soft color clusters\n\u2022 **Medium** - Unbiased random colors across the board\n\u2022 **Hard** - Tiles tend to differ from neighbors, creating a more scattered layout\n\n## Advanced Options\nCustomize board size, number of colors (3\u20136), timer, theme, tile colors, background, animations, language, sound, music, and randomness (shuffle intensity within your chosen difficulty).

